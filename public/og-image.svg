<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="white" fill-opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="white" fill-opacity="0.1"/>
  <circle cx="600" cy="315" r="400" fill="white" fill-opacity="0.05"/>
  
  <!-- Logo emoji -->
  <text x="600" y="250" text-anchor="middle" font-size="120">🎯</text>
  
  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">HugoQuiz</text>
  
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white" fill-opacity="0.9">Quiz • Questionnaires • Événements</text>
  
  <!-- Features -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" fill-opacity="0.8">Plan de salle | Livre d'or | QR Codes | Mode Live</text>
  
  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" fill-opacity="0.6">hugoquiz.com</text>
</svg>
